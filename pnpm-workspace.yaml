packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  workerd: true

catalog:
  "@fontsource-variable/geist": ^5.2.8
  "@types/node": ^24
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  lucide-react: ^1.7.0
  radix-ui: ^1.4.3
  shadcn: ^4.1.2
  tailwind-merge: ^3.5.0
  tw-animate-css: ^1.4.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

